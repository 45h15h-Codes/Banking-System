server {
    listen 80;
    
    location /api/v1/auth/ {
        proxy_pass http://auth-service:8001/;
    }
    location /api/v1/customers/ {
        proxy_pass http://customer-service:8002/;
    }
    location /api/v1/accounts/ {
        proxy_pass http://account-service:8003/;
    }
    location /api/v1/transactions/ {
        proxy_pass http://transaction-service:8004/;
    }
    location /api/v1/loans/ {
        proxy_pass http://loan-service:8005/;
    }
    location /api/v1/payments/ {
        proxy_pass http://payment-service:8006/;
    }
    
    # All other /api/v1/ goes to api-gateway
    location /api/ {
        proxy_pass http://api-gateway:8000;
    }
}
