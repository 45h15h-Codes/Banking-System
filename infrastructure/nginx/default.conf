server {
    listen 80;
    
    # Auth Service — routes /api/v1/auth/* to auth-service
    location /api/v1/auth/ {
        proxy_pass http://auth-service:8001/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Internal Auth Verify — for service-to-service token verification
    location /api/v1/internal/ {
        proxy_pass http://auth-service:8001/api/v1/internal/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/customers/ {
        proxy_pass http://customer-service:8002/api/v1/customers/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/accounts/ {
        proxy_pass http://account-service:8003/api/v1/accounts/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/transactions/ {
        proxy_pass http://transaction-service:8004/api/v1/transactions/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/loans/ {
        proxy_pass http://loan-service:8005/api/v1/loans/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/payments/ {
        proxy_pass http://payment-service:8006/api/v1/payments/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # All other /api/ goes to api-gateway
    location /api/ {
        proxy_pass http://api-gateway:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
